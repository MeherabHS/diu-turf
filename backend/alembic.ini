# Alembic configuration for DIU Hostel Turf Booking.
# Run migrations from the backend/ directory:
#   cd backend
#   alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Prepend backend/ to sys.path so services.* imports work inside env.py.
prepend_sys_path = .

# File name pattern for new revision files.
file_template = %%(rev)s_%%(slug)s

# Timezone for generated revision timestamps.
timezone = UTC

# Placeholder URL — overridden at runtime from DATABASE_URL env var in env.py.
# Must use postgresql+asyncpg:// dialect for the async engine.
sqlalchemy.url = postgresql+asyncpg://turf_user:turf_pass@127.0.0.1:5432/turf_db

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
